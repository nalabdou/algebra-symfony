name: Bug Report
description: Something is not working as expected
title: "[Bug]: "
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report.
        Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest possible code that demonstrates the bug.
      render: php
      placeholder: |
        <?php
        use Nalabdou\Algebra\Algebra;

        $result = Algebra::from([...])->where(...)->toArray();
        // Expected: [...]
        // Actual:   [...]
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: algebra-php version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: "8.2.x"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help (framework, OS, etc.)
